<style>
:root{--bg:#09090b;--card:#18181b;--card2:#27272a;--card3:#3f3f46;--accent:#eab308;--red:#ef4444;--cyan:#22d3ee;--green:#4ade80;--purple:#a78bfa;--text:#fafafa;--muted:#a1a1aa;--dim:#71717a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--card3);border-radius:4px}
.fade{animation:f .25s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:s .3s ease}@keyframes s{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.dial{background:#000;border:1px solid var(--card3);border-radius:12px;padding:10px 12px}
.dial-label{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.dial-val{font-family:'Courier New',monospace;font-size:14px;font-weight:700}
.item-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid #27272a;border-radius:16px;padding:14px 16px;color:var(--text);cursor:pointer;width:100%;text-align:left;transition:border-color .15s}
.item-btn:active{border-color:var(--accent);background:#1c1c1e}
.tab-btn{padding:6px 14px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tab-btn.on{background:var(--card2);color:var(--accent);border:1px solid var(--card3)}
.tab-btn.off{background:transparent;color:var(--dim);border:1px solid transparent}
.tip-card{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:14px;padding:14px}
.why-card{background:rgba(255,255,255,.03);border:1px solid var(--card3);border-radius:14px;padding:14px}
</style>
</head>

  {id:"exp-comp",emoji:"☀️",title:"Exposure Compensation Dial",sub:"The most important dial on the Zfc",
    tip:"The dedicated +/- dial on top of the camera is your best friend. Bright scene (beach, snow)? Turn to +0.7. Dark scene (night, bar)? Try -0.3. Done.",
    why:"This is the fastest way to fix lighting in Aperture Priority mode. Think of it as a 'brightness wheel'. After shooting, ALWAYS return it to zero!"},
  {id:"battery",emoji:"🔋",title:"Save Battery (Long Days)",sub:"Make your battery last all day",
    tip:"Press DISP button until only settings show (no live view). Now you are only using the EVF (electronic viewfinder), which uses 40% less battery!",
    why:"The big rear LCD screen is the biggest battery drain. Using only the EVF (the small viewfinder you put your eye to) dramatically extends battery life for those long Singapore days."},
  {id:"focus-peaking",emoji:"🎯",title:"Manual Focus Peaking",sub:"For pitch black environments",
    tip:"Menu → Custom Settings → Focus Peaking → Level 2 (Red). When AF fails in the dark, switch to MF and red highlights show you what is in focus.",
    why:"In very dark scenes (Night Safari, dim temples), autofocus hunts and fails. Manual focus with peaking shows you exactly what is sharp by highlighting edges in bright red."},
  {id:"silent",emoji:"🤫",title:"Silent Shutter Mode",sub:"For temples, churches, ceremonies",
    tip:"Menu → Photo Shooting → Silent Photography → ON. Zero shutter sound — essential during Sunday Mass or mosque visits.",
    why:"The mechanical shutter click is loud and disruptive in quiet sacred spaces. Silent electronic shutter mode is completely silent while producing identical image quality."},
  {id:"histogram",emoji:"📊",title:"Read the Histogram",sub:"Never blow highlights again",
    tip:"Press DISP until you see the histogram. If the graph touches the RIGHT edge, you are overexposing (losing detail in bright areas). Dial exposure comp DOWN.",
    why:"Your eyes lie in bright sunlight — the screen looks darker than reality. The histogram is mathematical truth. If it touches the right edge, those white areas have ZERO detail and cannot be recovered."},
  {id:"back-button",emoji:"🔙",title:"Back-Button Focus",sub:"Separate focus from shutter",
    tip:"Assign AF-ON to the AE-L/AF-L button via Custom Settings. Now the shutter button ONLY takes photos, and the back button ONLY focuses.",
    why:"This lets you focus once, then take multiple shots without the camera re-focusing each time. Crucial for recomposing shots and for situations where AF might re-lock on the wrong subject."},
  {id:"lens-swap",emoji:"🔄",title:"Lens Swap in Humidity",sub:"Avoid condensation and dust",
    tip:"In Singapore's humidity, NEVER swap lenses in open air. Step into an air-conditioned space (café, MRT station) to swap. Let the camera acclimatize for 2 min.",
    why:"Hot humid air hitting a cool sensor creates condensation that can fog your images and potentially damage electronics. Air-conditioned spaces have dry air — much safer for lens changes."},
  {id:"raw-jpeg",emoji:"💾",title:"When to Shoot RAW",sub:"Know when you need the extra data",
    tip:"Daytime = JPEG Fine is perfect. Night / tricky lighting / sunsets = switch to RAW (press i → Image Quality → RAW). RAW files are 3x larger but save much more detail.",
    why:"RAW files contain all the data from the sensor, letting you recover blown highlights and dark shadows in editing. For most daytime shots, JPEG Fine is excellent and saves storage."}
];

            </div>
          )}
        </div>
      )}
    </div>
  );
}

      {item.why&&(
        <div className="why-card">
          <div style={{fontSize:10,fontWeight:700,color:'var(--dim)',letterSpacing:1,marginBottom:4}}>💡 WHY THIS WORKS</div>
          <p style={{fontSize:12,lineHeight:1.5,color:'#d4d4d8'}}>{item.why}</p>
        </div>
      )}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState('sg');
  const[selected,setSelected]=useState(null);
  const[search,setSearch]=useState('');
  const tabs=[{id:'sg',label:'Singapore'},{id:'mk',label:'Melaka'},{id:'styles',label:'Styles'},{id:'tips',label:'Pro Tips'},{id:'learn',label:'📚 Learn'}];
  const lists={sg:SG,mk:MK,styles:STYLES,tips:TIPS};
  const items=tab==='learn'?[]:(lists[tab]||[]).filter(i=>
    i.title.toLowerCase().includes(search.toLowerCase())||
    (i.sub||'').toLowerCase().includes(search.toLowerCase())
  );

  if(selected){
    return(
      <div style={{maxWidth:480,margin:'0 auto',height:'100vh',display:'flex',flexDirection:'column'}}>
        <header style={{background:'#000',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--card)',flexShrink:0}}>
          <button onClick={()=>setSelected(null)} style={{background:'var(--card)',border:'none',borderRadius:8,padding:'6px 14px',color:'var(--text)',cursor:'pointer',fontSize:13,fontWeight:600}}>← Back</button>
          <div style={{fontSize:13,fontWeight:700,flex:1,textAlign:'center',color:'var(--accent)'}}>📸 Zfc Settings</div>
          <div style={{width:65}}/>
        </header>
        <div style={{flex:1,overflowY:'auto'}}><DetailView item={selected} onBack={()=>setSelected(null)}/></div>
      </div>
    );
  }

  return(
    <div style={{maxWidth:480,margin:'0 auto',height:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{background:'#000',padding:'14px 16px 0',borderBottom:'1px solid var(--card)',flexShrink:0}}>
        <div style={{textAlign:'center',marginBottom:8}}>
          <h1 style={{fontSize:16,fontWeight:800,letterSpacing:1}}>📸 NIKON Zfc FIELD GUIDE</h1>
          <p style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Singapore & Melaka 2026 · Tap a scene → get settings</p>
        </div>
        {tab!=='learn'&&<div style={{marginBottom:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search scenes..." style={{width:'100%',padding:'8px 12px',borderRadius:10,border:'1px solid var(--card2)',background:'var(--card)',color:'var(--text)',fontSize:13,outline:'none'}}/>
        </div>}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:10}}>
          {tabs.map(t=>(
            <button key={t.id} className={`tab-btn ${tab===t.id?'on':'off'}`} onClick={()=>{setTab(t.id);setSearch('')}}>
              {t.label}{lists[t.id]?` (${lists[t.id].length})`:''}
            </button>
          ))}
        </div>
      </header>
      <div style={{flex:1,overflowY:'auto',padding:'8px 16px 16px'}}>
        {tab==='learn'&&<LearnView/>}
        {tab!=='learn'&&items.map(item=>(
          <button key={item.id} className="item-btn" style={{marginBottom:6}} onClick={()=>setSelected(item)}>
            <span style={{fontSize:24,flexShrink:0}}>{item.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,lineHeight:1.2}}>{item.title}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{item.sub}</div>
            </div>
            <div style={{flexShrink:0,textAlign:'right'}}>
              {item.mode&&<span className="tag" style={{background:item.mode==='A'?'#164e63':item.mode==='S'?'#7f1d1d':'#3f3f46',color:item.mode==='A'?'var(--cyan)':item.mode==='S'?'var(--red)':'var(--text)'}}>{item.mode==='A'?'APT':item.mode==='S'?'SHT':'MAN'}</span>}
              <div style={{color:'var(--dim)',fontSize:20,marginTop:2}}>›</div>
            </div>
          </button>
        ))}
        {tab!=='learn'&&items.length===0&&<p style={{color:'var(--dim)',textAlign:'center',padding:30,fontSize:14}}>No scenes found.</p>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
